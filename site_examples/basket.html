<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md js-initialized">

    <!-- Main Content -->

                    </div>

                    </div>

                                readonly="" type="text" value="1">

                                <span class="material-symbols-outlined text-sm">add</span>
                            </button>
                        </div>
                        <button aria-label="Удалить"
                            class="text-error hover:text-on-error-container transition-colors p-xs rounded-full hover:bg-error-container">

                </div>
                <!-- Item 2 -->
                <div
                    class="bg-surface rounded-lg p-md shadow-[0px_4px_12px_rgba(0,0,0,0.05)] flex flex-col sm:flex-row items-center gap-md border border-outline-variant/30 relative">

                            data-alt="A macro shot of a modern multi-core computer processor chip. The intricate gold pins and metallic heat spreader are clearly visible against a bright, sterile background. The lighting highlights the precision engineering and high-tech nature of the component, fitting a premium corporate modern aesthetic."
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuAD-7kdoUwoOU0tUWvq1H9lMjgESh-hVSWPIkNX7WUJgR79_I1gCgSind5sLSBIUx_5UZnXNlPelEBEVDIkfgVv_gc_WoxMfW97A7RdNjKkf_MmpvpvfSMS86VTtC6kv1p_TKkaIIleR5WWTHz4tuApxRfdJc8D5-6iEgttpbUnXBiNU6KSsBEE2JfzggP_FmL7aGnX1XAL2zQk0qXrOEo8K4H9urapGeofVzU1_6IBwJqxrhO2Lps8uij_2KaWqpIrF3Pg5KXqlKc">
                    </div>
                    <div class="flex-grow flex flex-col justify-center">
                        <h3 class="font-headline-md text-body-lg text-on-background mb-base">Процессор Intel Core
                            i9-13900K</h3>
                        <p class="font-body-md text-label-md text-on-surface-variant mb-xs">Артикул: INT-I9-139</p>
                        <div class="font-headline-md text-headline-md font-bold text-primary">58 000 ₽</div>
                    </div>
                    <div class="flex items-center gap-sm mt-sm sm:mt-0">
                        <div class="flex items-center border border-outline-variant rounded-md overflow-hidden">
                            <button
                                class="w-8 h-8 flex items-center justify-center bg-surface hover:bg-surface-container transition-colors text-on-surface-variant">
                                <span class="material-symbols-outlined text-sm">remove</span>
                            </button>
                            <input
                                class="w-12 h-8 text-center border-none bg-surface text-on-background font-body-md focus:ring-0 p-0"
                                readonly="" type="text" value="1">
                            <button
                                class="w-8 h-8 flex items-center justify-center bg-surface hover:bg-surface-container transition-colors text-on-surface-variant">
                                <span class="material-symbols-outlined text-sm">add</span>
                            </button>
                        </div>
                        <button aria-label="Удалить"

                    class="bg-surface rounded-xl p-lg shadow-[0px_8px_24px_rgba(0,0,0,0.1)] border border-outline-variant/30 sticky top-24 hover:bg-surface-container-low transition-all duration-300 hover:shadow-md cursor-pointer">
                    <h2
                        class="font-headline-md text-headline-md text-on-background border-b border-outline-variant pb-sm mb-md">
                        Оформление</h2>
                    <!-- Additional Services -->
                    <div class="mb-md">
                        <h3 class="font-label-md text-label-md text-on-surface-variant mb-sm uppercase tracking-wide">
                            Дополнительные услуги</h3>
                        <div class="flex flex-col gap-xs">
                            <label

                            <label
                                class="flex items-center justify-between cursor-pointer p-sm rounded-md transition-colors hover:bg-surface-container-high">
                                <div class="flex items-center gap-xs">
                                    <input
                                        class="w-5 h-5 rounded border-outline text-primary focus:ring-primary focus:ring-offset-surface bg-surface cursor-pointer"

                                    <span class="font-body-md text-body-md text-on-background">Установка ОС</span>
                                </div>

                            </label>
                            <label
                                class="flex items-center justify-between cursor-pointer p-sm rounded-md transition-colors hover:bg-surface-container-high">
                                <div class="flex items-center gap-xs">
                                    <input checked=""
                                        class="w-5 h-5 rounded border-outline text-primary focus:ring-primary focus:ring-offset-surface bg-surface cursor-pointer"

                    </div>
                    <div class="border-t border-outline-variant pt-md mb-md">
                        <div class="flex justify-between items-end mb-sm">
                            <span class="font-body-md text-body-md text-on-surface-variant">Товары (2)</span>
                            <span class="font-body-md text-body-md text-on-background">183 000 ₽</span>
                        </div>
                        <div class="flex justify-between items-end mb-sm">
                            <span class="font-body-md text-body-md text-on-surface-variant">Услуги</span>
                            <span class="font-body-md text-body-md text-on-background">0 ₽</span>
                        </div>
                        <div class="flex justify-between items-end mt-md">
                            <span class="font-headline-md text-body-lg text-on-background">Итого:</span>
                            <span class="font-display-lg text-headline-lg text-primary">183 000 ₽</span>
                        </div>
                    </div>
                    <button
                        class="w-full bg-primary text-on-primary font-label-md text-label-md py-sm px-md rounded-lg shadow-sm transition-all active:scale-[0.98] flex items-center justify-center gap-xs hover:bg-primary-container">
                        Оформить заказ
                        <span class="material-symbols-outlined text-sm">arrow_forward</span>
                    </button>
                    <p class="font-label-sm text-label-sm text-on-surface-variant text-center mt-sm">
                        Нажимая кнопку, вы соглашаетесь с условиями обработки данных.
                    </p>
                </div>
            </div>
        </div>
        <script>
                (function () {
                    const updateTotals = () => {
                        let subtotal = 0;
                        document.querySelectorAll('main .flex-col.lg\\:flex-row > div:first-child > div').forEach(item => {
                            const priceText = item.querySelector('.text-primary').textContent.replace(/[^0-9]/g, '');
                            const quantity = parseInt(item.querySelector('input').value);
                            subtotal += parseInt(priceText) * quantity;
                        });

                        const servicesTotal = Array.from(document.querySelectorAll('input[type="checkbox"]:checked'))
                            .reduce((acc, cb) => {
                                const priceSpan = cb.closest('label').querySelector('span:last-child').textContent;
                                const price = parseInt(priceSpan.replace(/[^0-9]/g, '')) || 0;
                                return acc + price;
                            }, 0);

                        const total = subtotal + servicesTotal;

                        const summaryItems = document.querySelectorAll('.lg\\:w-1\\/3 .flex.justify-between.items-end');
                        summaryItems[0].querySelector('span:last-child').textContent = subtotal.toLocaleString('ru-RU') + ' ₽';
                        summaryItems[1].querySelector('span:last-child').textContent = servicesTotal.toLocaleString('ru-RU') + ' ₽';
                        summaryItems[2].querySelector('span:last-child').textContent = total.toLocaleString('ru-RU') + ' ₽';
                    };

                    document.querySelectorAll('main .flex-col.lg\\:flex-row > div:first-child > div').forEach(item => {
                        const minusBtn = item.querySelector('button:has(span:contains("remove"))') || item.querySelectorAll('button')[0];
                        const plusBtn = item.querySelector('button:has(span:contains("add"))') || item.querySelectorAll('button')[1];
                        const input = item.querySelector('input');
                        const deleteBtn = item.querySelector('button[aria-label="Удалить"]');

                        minusBtn.onclick = () => {
                            let val = parseInt(input.value);
                            if (val > 1) {
                                input.value = val - 1;
                                updateTotals();
                            }
                        };

                        plusBtn.onclick = () => {
                            input.value = parseInt(input.value) + 1;
                            updateTotals();
                        };

                        deleteBtn.onclick = () => {
                            const modal = document.createElement('div');
                            modal.className = 'fixed inset-0 z-[100] flex items-center justify-center bg-black/50 p-md';
                            modal.innerHTML = `
                <div class="bg-surface p-lg rounded-xl shadow-xl max-w-sm w-full border border-outline-variant">
                    <h3 class="font-headline-md text-headline-md mb-md">Удаление товара</h3>
                    <p class="font-body-md text-on-surface-variant mb-lg">Вы уверены, что хотите удалить этот товар из корзины?</p>
                    <div class="flex gap-sm justify-end">
                        <button class="px-md py-sm rounded-lg font-label-md border border-outline-variant hover:bg-surface-container transition-colors">Отмена</button>
                        <button class="px-md py-sm rounded-lg font-label-md bg-error text-on-error hover:opacity-90 transition-colors">Удалить</button>
                    </div>
                </div>`;

                            modal.querySelector('button:first-child').onclick = () => modal.remove();
                            modal.querySelector('button:last-child').onclick = () => {
                                item.remove();
                                updateTotals();
                                modal.remove();
                            };
                            document.body.appendChild(modal);
                        };
                    });

                    document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                        cb.onchange = updateTotals;
                    });
                })();
        </script>
    </main>
